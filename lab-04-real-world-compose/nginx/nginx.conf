# ============================================================
# Nginx configuration — Reverse Proxy for the Task Manager API
# ============================================================
#
# This configuration turns Nginx into a reverse proxy that sits
# in front of the Flask API. All requests from the outside world
# go through Nginx first, which then forwards them to the Flask
# backend running on port 5000.
#
# Why use a reverse proxy?
#   - The Flask development server is not designed for production
#     traffic. Nginx is fast, battle-tested, and handles many
#     concurrent connections efficiently.
#   - The API container doesn't need to be exposed to the host
#     directly — only Nginx is. This adds a layer of separation.
#   - In a real project you'd also use Nginx for SSL termination,
#     rate limiting, static file serving, and load balancing.
#
# How service names work:
#   Docker Compose creates a shared network where each service
#   is reachable by its name. The Flask service is called "api"
#   in docker-compose.yml, so Nginx can reach it at http://api:5000.
# ============================================================

# ----------------------------------------------------------------
# Upstream — define the backend server(s) that Nginx will proxy to.
# Using an upstream block makes it easy to add more backends later
# (e.g., for load balancing across multiple API instances).
# ----------------------------------------------------------------
upstream flask_api {
    server api:5000;
}

server {
    # Listen on port 80 inside the container.
    # docker-compose.yml maps host port 80 to this container port.
    listen 80;
    server_name localhost;

    # ------------------------------------------------------------
    # /api/ — Proxy all API requests to the Flask backend.
    #
    # When you run "curl localhost/api/tasks", Nginx receives the
    # request and forwards it to http://api:5000/api/tasks. The
    # Flask app handles it and sends the response back through
    # Nginx to the client.
    # ------------------------------------------------------------
    location /api/ {
        proxy_pass http://flask_api;

        # Pass the original Host header so Flask knows the real
        # hostname the client used to connect.
        proxy_set_header Host $host;

        # Forward the client's real IP address. Without this,
        # Flask would see all requests as coming from the Nginx
        # container's internal IP.
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Tell Flask whether the original request was HTTP or HTTPS.
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ------------------------------------------------------------
    # / — Root path. Returns a simple welcome message.
    #
    # In a real application this might serve a frontend (React,
    # Vue, etc.) or redirect to the API docs. For this lab we
    # just return a plain-text greeting so you can verify Nginx
    # is running with a simple "curl localhost".
    # ------------------------------------------------------------
    location / {
        default_type text/plain;
        return 200 "Welcome to the Task Manager! 🚀\n\nAvailable endpoints:\n  GET  /api/tasks   — List all tasks\n  POST /api/tasks   — Create a task\n  GET  /api/health  — Health check\n";
    }
}
